name: Deploy 3dtiskjeradost Workers

on:
  push:
    branches: [master, dev]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.jsonc'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

concurrency:
  group: deploy-3dtiskjeradost-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy production worker
        if: github.ref_name == 'master'
        run: npx wrangler deploy --name 3dtiskjeradost --keep-vars --message "production ${GITHUB_SHA}"

      - name: Deploy dev worker
        if: github.ref_name == 'dev'
        run: npx wrangler deploy --name 3dtiskjeradost-dev --domain dev.3dtiskjeradost.cz --keep-vars --message "dev ${GITHUB_SHA}"
